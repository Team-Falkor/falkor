name: Crowdin PR Sync

on:
  workflow_dispatch:  
  push:
    paths:
      - 'src/i18n/translations/en.json'
      - '.github/workflows/crowdin.yml'
      - 'crowdin.yml'
  schedule:
    - cron: '0 3 * * *' # Every day at 3am UTC

jobs:
  crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Crowdin Action
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          download_translations: true
          config: 'crowdin.yml'
          create_pull_request: true
          pull_request_title: 'chore: update translations from Crowdin'
          pull_request_body: |
            This PR was automatically generated by the [Crowdin GitHub Action](https://github.com/marketplace/actions/crowdin-action).
            It contains the latest translations from Crowdin.
          pull_request_base_branch: ${{ github.ref_name }}
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_API_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
