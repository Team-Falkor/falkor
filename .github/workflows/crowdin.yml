name: Crowdin PR Sync

# TODO: set to main when PR is merge
on:
  push:
    branches: [ recode ]
  workflow_dispatch:  # Manual trigger
  # schedule:
  #   - cron: '0 3 * * *' # Uncomment for daily sync at 3am UTC

jobs:
  synchronize-with-crowdin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crowdin Action
        uses: crowdin/github-action@v2
        with:
          config: 'crowdin.yml'
          upload_sources: true
          upload_translations: false
          download_translations: true
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: true
          pull_request_title: 'chore: update translations from Crowdin'
          pull_request_body: |
            This PR was automatically generated by the [Crowdin GitHub Action](https://github.com/crowdin/github-action).
            It contains the latest translations from Crowdin.
          pull_request_base_branch_name: 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_API_TOKEN }}
